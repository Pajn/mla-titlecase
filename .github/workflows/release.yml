name: release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag name to publish, for example v0.1.0
        required: false
        type: string
      publish_crates:
        description: Publish both crates to crates.io after uploading release assets
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    uses: ./.github/workflows/reusable-rust-validate.yml
    with:
      toolchain: stable

  build-cli-binaries:
    name: build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tgz
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tgz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tgz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' }}
        run: sudo apt-get update && sudo apt-get install --yes musl-tools

      - name: Resolve release metadata
        shell: bash
        run: |
          VERSION=$(cargo pkgid -p mla-titlecase-cli | sed -E 's/.*#(.*)$/\1/')
          if [[ "${{ github.event_name }}" == "push" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="${{ inputs.release_tag }}"
          fi

          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "release_tag is required for workflow_dispatch" >&2
            exit 1
          fi

          if [[ "${RELEASE_TAG}" != "v${VERSION}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match CLI crate version v${VERSION}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_ENV}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "archive_base=mla-titlecase-cli-${{ matrix.target }}-v${VERSION}" >> "${GITHUB_ENV}"

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }} -p mla-titlecase-cli

      - name: Package release archive
        shell: bash
        run: |
          ARCHIVE_DIR="${archive_base}"
          mkdir -p "${ARCHIVE_DIR}"
          cp README.md LICENSE "${ARCHIVE_DIR}/"

          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/mla-titlecase.exe" "${ARCHIVE_DIR}/mla-titlecase.exe"
            7z a "${archive_base}.zip" "./${ARCHIVE_DIR}/*"
            sha256sum "${archive_base}.zip" > "${archive_base}.zip.sha256"
          else
            cp "target/${{ matrix.target }}/release/mla-titlecase" "${ARCHIVE_DIR}/mla-titlecase"
            tar -czf "${archive_base}.tgz" "${ARCHIVE_DIR}"
            sha256sum "${archive_base}.tgz" > "${archive_base}.tgz.sha256"
          fi

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tgz
            *.tgz.sha256
            *.zip
            *.zip.sha256

  publish-release:
    runs-on: ubuntu-latest
    needs: build-cli-binaries
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Resolve release metadata
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="${{ inputs.release_tag }}"
          fi

          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "release_tag is required for workflow_dispatch" >&2
            exit 1
          fi

          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_ENV}"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            echo "Release ${release_tag} already exists"
          else
            gh release create "${release_tag}" --draft --generate-notes
          fi

      - name: Upload release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${release_tag}" release-artifacts/*/* --clobber

  publish-crates:
    runs-on: ubuntu-latest
    needs: publish-release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_crates }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          cargo publish -p mla-titlecase --locked
          for attempt in {1..10}; do
            if cargo publish -p mla-titlecase-cli --locked; then
              exit 0
            fi

            if [[ "${attempt}" == "10" ]]; then
              echo "Timed out waiting for mla-titlecase to become available on crates.io" >&2
              exit 1
            fi

            sleep 30
          done
